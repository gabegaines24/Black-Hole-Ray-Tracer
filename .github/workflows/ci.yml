name: CI

on:
  push:
    branches: ["main", "dev/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build native extension (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y build-essential
          BLACKHOLE_BUILD_NATIVE=1 uv sync --extra dev
        env:
          BLACKHOLE_BUILD_NATIVE: "1"

      - name: Install (without native extension)
        if: runner.os != 'Linux'
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q --tb=short
        env:
          BLACKHOLE_BUILD_NATIVE: "1"

  kernel:
    name: "Kernel C parity (ubuntu-latest)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build kernel demos
        run: make -C kernel all

      - name: Smoke test phase2_batch_demo
        run: |
          ./kernel/phase2_batch_demo | grep -q "BH_PHASE2_BATCH_RESULT"

  cuda-build:
    # Optional job — only runs when the `CUDA_AVAILABLE` repository variable is set to '1'.
    # To enable: Settings → Variables → New repository variable → CUDA_AVAILABLE = 1
    name: "CUDA kernel build (optional)"
    runs-on: ubuntu-latest
    if: vars.CUDA_AVAILABLE == '1'

    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q nvidia-cuda-toolkit

      - name: Build CUDA batch library
        run: |
          mkdir -p build
          make -C kernel/cuda cuda_batch ARCH=sm_75

      - name: Verify shared library exists
        run: |
          test -f build/libbh_rt_phase2_cuda.so && echo "CUDA library built OK"
